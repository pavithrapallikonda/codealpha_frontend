<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Image Gallery</h1>

<div class="gallery">
    <img src="images/1.jpg" onclick="openImage(this.src)">
    <img src="images/2.jpg" onclick="openImage(this.src)">
    <img src="images/3.jpg" onclick="openImage(this.src)">
    <img src="images/4.jpg" onclick="openImage(this.src)">
    <img src="images/5.jpg" onclick="openImage(this.src)">
    <img src="images/6.jpg" onclick="openImage(this.src)">
</div>

<div id="lightbox">
    <span onclick="closeImage()">&times;</span>
    <img id="lightbox-img">
</div>

<script src="script.js"></script>

</body>
</html>
